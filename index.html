<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WURL 3D Theater</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <button id="flythrough-btn" title="Play flythrough">&#9654;</button>
    <button id="flythrough-restart" title="Restart flythrough">&#8634;</button>
    <div id="top-controls">
        <div id="compass" title="Drag to rotate view">
                <div id="compass-arrow">
                    <span id="compass-n">N</span>
                    <span id="compass-arrow-icon">▲</span>
                    <span id="compass-s">S</span>
                </div>
            </div>
        <div id="button-pill">
            <button id="zoom-in">+</button>
            <button id="zoom-out">−</button>
            <button id="mode-btn">2D</button>
        </div>
    </div>
    <div id="elevation-profile">
        <button id="profile-toggle" title="Toggle elevation profile">
            <span id="toggle-arrow">▲</span>
        </button>
        <div id="profile-content">
            <canvas id="profile-canvas"></canvas>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
