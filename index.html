<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WURL 3D Theater</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div id="top-controls">
        <div id="compass" title="Drag to rotate view">
                <div id="compass-arrow">
                    <span id="compass-n">N</span>
                    <span id="compass-arrow-icon">▲</span>
                    <span id="compass-s">S</span>
                </div>
            </div>
        <div id="button-pill">
            <button id="zoom-in">+</button>
            <button id="zoom-out">−</button>
            <button id="mode-btn">2D</button>
        </div>
    </div>
    <div id="elevation-profile">
        <canvas id="profile-canvas"></canvas>
    </div>
    <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
